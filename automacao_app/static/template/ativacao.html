<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automação</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI" crossorigin="anonymous"></script>
    <link rel="stylesheet" type="text/css"  href="{{ url_for('static', filename='style/style.css')}}">
</head>
<body>
    <div class="jumbotron">
        <h1>Painel de Ativação dos Robôs</h1>
        <form class="mt-4" method="post" action="{{ url_for("ativacao.ativacao") }}">
            <label for="buscar">Buscar por palavra chave</label>
            <input type="text" id="buscar" name="buscar"/>
            <input class="btn btn-secondary" type="submit" value="Buscar">
        </form>
    </div>
    <div class="container-fluid d-flex flex-row flex-wrap ">
        <div class="alert alert-danger mb-3 p-2 d-flex flex-column align-items-center w-100" role="alert">
            <p class="m-0 text-center">
                Ao clicar em Desativar, o processo será interrompido em aprox. 20 segundos
            </p>
        </div>
        {% for key, val in procs.items() %}
             <div class="shadow rounded m-4 p-3 bg-light card">
                <h3>Processo {{ key }}</h3>
                <form method="post" action="{{ url_for("ativacao.ativacao") }}">

                    {% if val == True %}
                        <div class="d-inline-flex">
                            <p>Status de ativação: </p>
                            <p class="font-weight-bold text-success ml-1"> Ativo</p>
                        </div>
                        <br>
                        <input class="btn btn-danger" type="submit" name="{{ key }}" value="Desativar">
                    {% else %}
                        <div class="d-inline-flex">
                            <p>Status de ativação: </p>
                            <p class="font-weight-bold text-danger ml-1"> Inativo</p>
                        </div>
                        <br>
                        <input class="btn btn-success" type="submit" name="{{ key }}" value="Ativar">
                    {% endif %}
                </form>
             </div>
        {% endfor %}
    </div>
</body>
</html>
